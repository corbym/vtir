name: Install backlog-mcp
description: Install the backlog-mcp binary and expose its path

outputs:
  binary-path:
    description: Absolute path to the installed backlog-mcp binary
    value: ${{ steps.install.outputs.binary-path }}

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: false

    - name: Install binary
      id: install
      shell: bash
      run: |
        go install github.com/corbym/backlog-mcp@v1.0.3
        echo "binary-path=$(go env GOPATH)/bin/backlog-mcp" >> "$GITHUB_OUTPUT"
