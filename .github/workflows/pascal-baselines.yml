name: Regenerate Pascal Baselines

# ────────────────────────────────────────────────────────────────────────────
# This workflow is intentionally MANUAL-ONLY (`workflow_dispatch`).
# It should be run when you want to update the Pascal baseline fixtures, e.g.:
#   • After changing pascal-tests/vt_harness.pas
#   • When adding a new test scenario
#   • When a Rust bug fix changes expected behaviour and you want to confirm
#     the Pascal output still matches
#
# The workflow:
#   1. Installs fpc (Free Pascal Compiler)
#   2. Compiles and runs vt_harness.pas to regenerate JSON fixtures
#   3. Opens a pull-request targeting the current branch if fixtures changed
#
# A change in a fixture file that was NOT intentionally caused by a Pascal
# source change is a red flag — review carefully before merging the PR.
# ────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: >
          Branch to regenerate baselines for (and open a PR against).
          Defaults to the repository default branch.
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  regenerate-baselines:
    name: Regenerate Pascal baseline fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || github.ref }}
          # Need full history so we can push a new branch
          fetch-depth: 0

      - name: Install Free Pascal Compiler
        run: sudo apt-get update && sudo apt-get install -y fp-compiler

      - name: Compile and run harness
        run: bash pascal-tests/run_harness.sh

      - name: Check for fixture changes
        id: check_changes
        run: |
          if git diff --quiet \
               crates/vti-ay/tests/fixtures/pascal-baselines/ \
               crates/vti-core/tests/fixtures/pascal-baselines/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.check_changes.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install ALSA headers (required for full build)
        if: steps.check_changes.outputs.changed == 'true'
        run: sudo apt-get install -y libasound2-dev pkg-config

      - name: Smoke-test updated fixtures (Rust tests must compile)
        if: steps.check_changes.outputs.changed == 'true'
        run: cargo test -p vti-core -p vti-ay --test pascal_baseline_tests 2>&1 || true
        # We allow failure here because the whole point of this workflow is to
        # update baselines that the Rust code may not yet match. The important
        # thing is that the fixtures are regenerated without error.

      - name: Create PR with updated fixtures
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(baselines): regenerate Pascal approval-test fixtures"
          branch: "chore/regenerate-pascal-baselines"
          title: "chore(baselines): regenerate Pascal approval-test fixtures"
          body: |
            ## Automated baseline regeneration

            This PR was created by the **Regenerate Pascal Baselines** workflow
            (`workflow_dispatch`).

            The following fixture files were regenerated by running
            `bash pascal-tests/run_harness.sh` against the current
            `pascal-tests/vt_harness.pas`:

            - `crates/vti-ay/tests/fixtures/pascal-baselines/noise_lfsr.json`
            - `crates/vti-ay/tests/fixtures/pascal-baselines/envelope_shapes.json`
            - `crates/vti-core/tests/fixtures/pascal-baselines/pt3_vol.json`
            - `crates/vti-core/tests/fixtures/pascal-baselines/note_tables.json`
            - `crates/vti-core/tests/fixtures/pascal-baselines/pattern_play_basic.json`
            - `crates/vti-core/tests/fixtures/pascal-baselines/pattern_play_envelope.json`

            ### Review checklist
            - [ ] The diff is caused by an intentional change to `vt_harness.pas`
                  or a confirmed Pascal behaviour discovery — **not** a silent regression.
            - [ ] Any Rust baseline tests that now fail have been triaged and
                  corresponding fix PRs are planned or already open.
          labels: baselines,automated

      - name: No changes to fixtures
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "Fixtures are already up to date — no PR needed."
