name: Build

on:
  push:
    branches:
      - master
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    # Native builds are expensive — only run on pushes to master, not on PRs.
    # Web (WASM) and JS checks below still run on every PR.
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install ALSA headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Run library + integration tests
        run: cargo test -p vti-core -p vti-ay -p vti-audio

      - name: Build CLI binary (vti-cli)
        run: cargo build --bin vti-cli --features cli

  # ── Web / WASM check ────────────────────────────────────────────────────────
  # Verifies that the web (wasm32-unknown-unknown) target still compiles on
  # every push and PR.  Actual Pages deployment is handled by pages.yml and
  # runs only on pushes to master (or manually).
  check-wasm:
    name: Check WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check (wasm32-unknown-unknown)
        run: cargo check --target wasm32-unknown-unknown

  # ── JavaScript tests ────────────────────────────────────────────────────────
  # Tests for WASM-layer JS (keyboard fix, DOM interactions).
  # Runs on every push and PR alongside the Rust test job.
  test-js:
    name: JavaScript tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test
