name: Deploy to GitHub Pages

# Runs on push to master OR can be triggered manually.
# This workflow is intentionally separate from the binary release workflow
# (release.yml) so the web build can be deployed independently at any time.
#
# NOTE: GitHub Pages must be configured to serve from the gh-pages branch
# (Settings → Pages → Source → "Deploy from a branch" → gh-pages / root).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-cargo-

      # Verify the WASM target compiles before invoking trunk
      - name: Check WASM build
        run: cargo check --target wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build web app
        run: trunk build --release --public-url /vtir/

      # Preserve any PR preview directories that live on the gh-pages branch
      # so that a main-site redeploy does not wipe them.
      - name: Restore PR previews from gh-pages branch
        run: |
          if git ls-remote --exit-code origin gh-pages; then
            git fetch origin gh-pages:refs/remotes/origin/gh-pages
            git checkout origin/gh-pages -- pr-previews 2>/dev/null || true
            [ -d pr-previews ] && mv pr-previews dist/ || true
          fi
        continue-on-error: true

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/
