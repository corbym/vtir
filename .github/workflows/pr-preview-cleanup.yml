name: PR Preview Cleanup

# Removes the WASM preview deployed by pr-preview.yml when the PR is closed
# (whether merged or abandoned).  This keeps the gh-pages branch tidy.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    name: Remove PR Preview
    runs-on: ubuntu-latest
    # Skip fork PRs — they never had a preview deployed (see pr-preview.yml).
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory and push
        run: |
          PR_DIR="pr-previews/${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git rm -rf "$PR_DIR"
            git commit -m "chore: remove PR ${{ github.event.pull_request.number }} preview"
            git push
          else
            echo "No preview directory found for PR ${{ github.event.pull_request.number }}, nothing to clean up."
          fi
