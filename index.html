<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Vortex Tracker II</title>
    <style>
        html, body {
            margin: 0;
            overflow: hidden;
            background: #1c1c1c;
            /* On mobile, fill-available prevents the body from extending behind
               the browser's address/navigation bar. */
            height: 100vh;
            height: -webkit-fill-available;
        }
        canvas {
            display: block;
            width: 100vw;
            /* 100dvh (dynamic viewport height) tracks the real visible area on
               mobile as the browser toolbar shows/hides, so the bottom status
               bar and timers are never clipped.  100vh is the fallback for
               browsers that do not yet support dvh units. */
            height: 100vh;
            height: 100dvh;
        }
    </style>
</head>
<body>
    <script>
    /* Mobile virtual-keyboard fix
     * ─────────────────────────────────────────────────────────────────────────
     * eframe proxies all keyboard input through a single hidden
     * <input type="text"> called the "text agent".  It focuses this element
     * from requestAnimationFrame, which iOS Safari does NOT treat as a
     * user-gesture context, so the virtual keyboard never appears.
     *
     * Fix:
     *   1. Wait for eframe to append the text agent to <body> (it does so
     *      after WASM initialisation), then attach two event listeners:
     *      a. canvas touchend  → immediately focus the input (synchronous
     *         user-gesture context; iOS Safari allows keyboard popup here).
     *      b. input blur       → if a touch occurred recently, re-focus the
     *         input right away to cancel the blur before iOS can dismiss the
     *         keyboard.  This covers the window between the touchend and the
     *         frame where eframe's own ime-based management takes over.
     *   2. A MutationObserver on <body> detects the input insertion so the
     *      listeners are attached even if WASM loads faster than expected.
     */
    (function () {
        'use strict';
        function attach(input) {
            /* 'the_canvas_id' must match the <canvas id="the_canvas_id"> below. */
            var canvas = document.getElementById('the_canvas_id');
            if (!canvas) { return; }
            var keep = false;
            var timer = null;
            canvas.addEventListener('touchend', function () {
                keep = true;
                clearTimeout(timer);
                input.focus();
                /* Give eframe ~500 ms to process the tap and set ime.
                   After that, eframe's own text_agent.focus() calls take over
                   (driven by the keyboard-anchor TextEdit in the pattern editor). */
                timer = setTimeout(function () { keep = false; }, 500);
            }, { passive: true });
            /* If eframe calls blur() before ime is established, immediately
               re-focus so the keyboard is not dismissed prematurely. */
            input.addEventListener('blur', function () {
                if (keep) { input.focus(); }
            });
        }
        /* Check if the text agent already exists (unlikely at script parse
           time, but safe to handle). */
        var existing = document.querySelector('input[type=text]');
        if (existing) { attach(existing); return; }
        /* Watch for eframe to append the text agent to <body>. */
        var mo = new MutationObserver(function (list) {
            for (var i = 0; i < list.length; i++) {
                var nodes = list[i].addedNodes;
                for (var j = 0; j < nodes.length; j++) {
                    var n = nodes[j];
                    if (n.nodeName === 'INPUT' && n.type === 'text') {
                        mo.disconnect();
                        attach(n);
                        return;
                    }
                }
            }
        });
        mo.observe(document.body, { childList: true });
    }());
    </script>
    <!-- trunk injects the WASM loader script here -->
    <canvas id="the_canvas_id"></canvas>
</body>
</html>
